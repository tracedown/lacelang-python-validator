name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    if: github.repository == 'tracedown/lacelang-python-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validator
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  conformance:
    needs: test
    if: github.repository == 'tracedown/lacelang-python-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Clone lacelang spec repo
        run: git clone --depth 1 https://github.com/tracedown/lacelang.git ../lacelang
      - name: Install OpenSSL dev
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Build conformance harness
        run: cd ../lacelang/testkit/src && make
      - name: Generate TLS test certs
        run: mkdir -p /tmp/lace-certs && sh ../lacelang/testkit/certs/generate-certs.sh /tmp/lace-certs
      - name: Run conformance suite
        run: ../lacelang/testkit/src/build/lace-conformance -m lace-executor.toml --vectors ../lacelang/testkit/vectors --certs-dir /tmp/lace-certs

  dry-run:
    needs: conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Publish to TestPyPI
        run: twine upload --repository-url https://test.pypi.org/legacy/ --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
