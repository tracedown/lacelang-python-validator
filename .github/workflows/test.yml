name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    if: github.repository == 'tracedown/lacelang-python-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validator
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  conformance:
    needs: test
    if: github.repository == 'tracedown/lacelang-python-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Download conformance harness
        run: |
          TAG=$(gh release view -R tracedown/lacelang --json tagName -q .tagName)
          gh release download "$TAG" -R tracedown/lacelang -p 'lace-conformance-linux-x86_64'
          chmod +x lace-conformance-linux-x86_64
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Clone test certs
        run: git clone --depth 1 --filter=blob:none --sparse https://github.com/tracedown/lacelang.git ../lacelang && cd ../lacelang && git sparse-checkout set testkit/certs
      - name: Generate TLS test certs
        run: mkdir -p /tmp/lace-certs && sh ../lacelang/testkit/certs/generate-certs.sh /tmp/lace-certs
      - name: Run conformance suite
        run: ./lace-conformance-linux-x86_64 -m lace-executor.toml --certs-dir /tmp/lace-certs

  build-check:
    needs: conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: pip install build twine && python -m build
      - name: Check distributions
        run: twine check dist/*
